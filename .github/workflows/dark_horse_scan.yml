name: Weekly Dark Horse Screen

# NOTE: native GitHub `schedule:` proved unreliable on other Claudeown
# workflows (Top Gainers drifted by 1h43m-2h13m instead of firing every
# 30 min). Removed here too for consistency; dispatched externally via
# cron-job.org instead.

on:
  workflow_dispatch: {}

jobs:
  screen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run dark horse screener
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
        run: python dark_horse_scanner.py

