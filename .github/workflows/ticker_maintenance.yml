name: Ticker Auto-Maintenance

on:
  schedule:
    # 2:30 UTC = 8:00 AM IST, weekdays - runs before Health Check and
    # before market open, so any auto-fixes are in place for the day
    - cron: "30 2 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write   # needed to commit universe/failure-tracking updates

jobs:
  maintain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ticker maintenance
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
        run: python ticker_maintenance.py

      - name: Save updated universe + failure tracking
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_universe.json ticker_failures.json
          git diff --staged --quiet || git commit -m "Auto-update ticker universe [skip ci]"
          git push || echo "Nothing to push"
