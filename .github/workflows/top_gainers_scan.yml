name: Live Top Gainers Scan

on:
  schedule:
    # Every 30 min, 9:45 AM to 3:15 PM IST (4:15-9:45 UTC), weekdays
    - cron: "*/30 4-9 * * 1-5"
  workflow_dispatch: {}

jobs:
  gainers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run top gainers scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
        run: python top_gainers_scanner.py
