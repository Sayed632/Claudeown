name: Live Top Gainers Scan

# NOTE: native GitHub `schedule:` was tested and proved unreliable -
# on 21-Jul-2026, runs meant to fire every 30 min instead fired at
# 06:25, 09:08, 11:22 UTC (gaps of 1h43m and 2h13m). Removed the
# schedule trigger; this is now dispatched externally via cron-job.org,
# same reliable pattern used for the other Claudeown workflows.

on:
  workflow_dispatch: {}

jobs:
  gainers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run top gainers scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
        run: python top_gainers_scanner.py
