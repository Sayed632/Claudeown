name: Sectorwise Early Volume Scan (All Nifty 500)

# MASTER ORCHESTRATOR PATTERN:
# Job 1 reads sector_stock_lists.json and outputs the list of sector names.
# Job 2 then runs ONE PARALLEL JOB PER SECTOR (a "matrix") - all 18 sectors
# scan at the same time instead of one after another. This is how full
# Nifty 500 coverage (493 stocks) fits inside a 5-minute cycle: each
# individual job only scans its own sector (~10-95 stocks), not all 493.
#
# NOTE ON TRIGGERING: native GitHub `schedule:` cron was tested on
# 15-Jul-2026 and proved unreliable for a every-5-min cadence - only 1
# of ~13 expected runs fired during the 9:15-10:15 AM window, and it
# fired 36 minutes late (10:51 AM instead of within the window). This
# is a known GitHub Actions limitation on frequent schedules, especially
# for public repos on shared infrastructure - not a bug in this code.
#
# Fix: trigger externally via cron-job.org hitting the workflow_dispatch
# API every 5 min during 9:15-10:15 AM IST, same proven pattern already
# used elsewhere in this repo for reliable dispatch.

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate-sector-list:
    runs-on: ubuntu-latest
    outputs:
      sectors: ${{ steps.list.outputs.sectors }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Read sector names from sector_stock_lists.json
        id: list
        run: |
          SECTORS=$(python3 -c "import json; print(json.dumps(list(json.load(open('sector_stock_lists.json')).keys())))")
          echo "sectors=$SECTORS" >> "$GITHUB_OUTPUT"
          echo "Sectors found: $SECTORS"

  scan-each-sector:
    needs: generate-sector-list
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # one sector failing shouldn't cancel the other 17
      matrix:
        sector: ${{ fromJson(needs.generate-sector-list.outputs.sectors) }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scan sector - ${{ matrix.sector }}
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
          SECTOR: ${{ matrix.sector }}
        run: python early_volume_scanner.py

      # 18 sector jobs run in parallel and may try to push around the same
      # moment - since each writes a UNIQUELY-named file (no shared file
      # being edited), conflicts only happen at the "update branch ref"
      # step, not on file content. Retry with re-pull handles that safely.
      - name: Commit pending alert file (if any), with retry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain alerts/pending/ 2>/dev/null)" ]; then
            echo "No new pending alert file for this sector - nothing to commit."
            exit 0
          fi
          for attempt in 1 2 3 4 5 6 7 8; do
            git add alerts/pending/
            git commit -m "Add pending early-volume alert: ${{ matrix.sector }} [automated]" || true
            if git push; then
              echo "Pushed successfully on attempt $attempt"
              exit 0
            fi
            echo "Push failed (attempt $attempt) - pulling latest and retrying..."
            sleep $((RANDOM % 5 + 1))
            git pull --rebase
          done
          echo "WARNING: could not push pending alert file after 8 attempts"
