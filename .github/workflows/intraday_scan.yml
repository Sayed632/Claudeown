name: Intraday ORB Scan

# NOTE: native GitHub `schedule:` proved unreliable elsewhere in this
# repo, especially at frequent intervals (Top Gainers, every 30 min,
# drifted by 1h43m-2h13m). This one runs every 15 min, so it's likely
# the MOST affected - removed schedule, dispatched externally via
# cron-job.org instead.
# (First 30 min of market is skipped on purpose - that's the Opening Range itself.)

on:
  workflow_dispatch: {}

permissions:
  contents: write   # needed so the workflow can save today's alert-tracking file

jobs:
  intraday_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run intraday scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
        run: python intraday_scanner.py

      - name: Save alert-tracking state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add alerted_today.json signal_log.json
          git diff --staged --quiet || git commit -m "Update alert state + signal log [skip ci]"
          git push || echo "Nothing to push"
