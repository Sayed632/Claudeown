name: Intraday ORB Scan

on:
  schedule:
    # Runs every 15 min, 9:45 AM to 3:15 PM IST (4:15-9:45 UTC), weekdays.
    # (First 30 min of market is skipped on purpose - that's the Opening Range itself.)
    - cron: "*/15 4-9 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write   # needed so the workflow can save today's alert-tracking file

jobs:
  intraday_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run intraday scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
        run: python intraday_scanner.py

      - name: Save alert-tracking state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add alerted_today.json
          git diff --staged --quiet || git commit -m "Update alert state [skip ci]"
          git push || echo "Nothing to push"