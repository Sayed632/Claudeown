name: Early Volume Spike Scan (Legacy - Manual Only)

# NOTE: automatic schedule removed. This has been superseded by
# "Sectorwise Early Volume Scan (All Nifty 500)", which covers all 493
# Nifty 500 stocks across 18 parallel sector jobs instead of just the
# 109-stock main_universe. Kept here for manual testing / comparison
# only - trigger it yourself from the Actions tab if needed.

on:
  workflow_dispatch: {}

jobs:
  early_volume:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run early volume spike scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
        run: python early_volume_scanner.py
