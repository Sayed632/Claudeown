name: Daily Health Check

# NOTE: native GitHub `schedule:` proved unreliable elsewhere in this
# repo - removed for consistency, dispatched externally via cron-job.org.

on:
  workflow_dispatch: {}

jobs:
  health_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run self health-check
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
        run: python health_check.py
